<div class="login-shell">
  <div class="login-decor">
    <span class="decor-orb decor-orb--left"></span>
    <span class="decor-orb decor-orb--right"></span>
    <span class="decor-ring"></span>
  </div>

  <section class="login-card">
    <div class="login-card__topbar">
      <img class="app-brand-logo app-brand-logo--login" src="assets/icons/KG_logo.png" [attr.alt]="i18n.t('common.brand')" />
      <app-language-switcher />
    </div>

    <p class="eyebrow">{{ i18n.t('login.eyebrow') }}</p>
    <h1>{{ i18n.t('login.title') }}</h1>
    <p class="subtitle">{{ i18n.t('login.subtitle') }}</p>

    <div class="mode-switch" role="tablist" [attr.aria-label]="i18n.t('login.aria.modeSwitch')">
      <button
        type="button"
        class="mode-btn"
        [class.mode-btn--active]="mode === 'signin'"
        (click)="setMode('signin')"
      >
        {{ i18n.t('login.tabs.signin') }}
      </button>
      <button
        type="button"
        class="mode-btn"
        [class.mode-btn--active]="mode === 'signup'"
        (click)="setMode('signup')"
      >
        {{ i18n.t('login.tabs.signup') }}
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <ng-container *ngIf="mode === 'signup'">
        <label for="displayName">{{ i18n.t('login.displayName') }}</label>
        <input
          id="displayName"
          type="text"
          [(ngModel)]="displayName"
          name="displayName"
          [placeholder]="i18n.t('login.displayNamePlaceholder')"
          autocomplete="name"
          required
          class="form-input"
        />
      </ng-container>

      <label for="username">{{ i18n.t('login.username') }}</label>
      <input
        id="username"
        type="text"
        [(ngModel)]="username"
        name="username"
        [placeholder]="i18n.t('login.usernamePlaceholder')"
        autocomplete="username"
        required
        class="form-input"
      />

      <p class="helper-note" *ngIf="normalizedUsernamePreview">
        {{ i18n.t('login.connectionPreview') }} <strong>{{ normalizedUsernamePreview }}</strong>
      </p>

      <label for="password">{{ i18n.t('login.password') }}</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        [placeholder]="i18n.t('login.passwordPlaceholder')"
        autocomplete="{{ mode === 'signup' ? 'new-password' : 'current-password' }}"
        required
        class="form-input"
      />

      <ng-container *ngIf="mode === 'signup'">
        <label for="confirmPassword">{{ i18n.t('login.confirmPassword') }}</label>
        <input
          id="confirmPassword"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [placeholder]="i18n.t('login.confirmPasswordPlaceholder')"
          autocomplete="new-password"
          required
          class="form-input"
        />
      </ng-container>

      <div *ngIf="infoMessage" class="info-message">
        {{ infoMessage }}
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="isLoading || !username.trim() || !password.trim() || (mode === 'signup' && (!displayName.trim() || !confirmPassword.trim()))"
      >
        {{
          isLoading
            ? i18n.t('login.submit.wait')
            : (mode === 'signup' ? i18n.t('login.submit.signup') : i18n.t('login.submit.signin'))
        }}
      </button>
    </form>
  </section>
</div>
